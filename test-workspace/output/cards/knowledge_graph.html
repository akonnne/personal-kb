<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>澳洲策略知识图谱</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
    font-family: system-ui, "Microsoft YaHei", "PingFang SC", sans-serif;
    background: #f8f9fa;
    overflow: hidden;
    height: 100vh;
}
.header {
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 10;
    padding: 16px 24px;
    background: linear-gradient(180deg, #f8f9fa 60%, transparent);
    pointer-events: none;
}
.header h1 {
    font-size: 20px;
    font-weight: 700;
    color: #1a1a2e;
}
.header p {
    font-size: 13px;
    color: #888;
    margin-top: 3px;
}
.tooltip {
    position: absolute;
    z-index: 20;
    background: rgba(30,30,40,0.92);
    color: #fff;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    pointer-events: none;
    opacity: 0;
    transition: opacity .15s;
    max-width: 320px;
    line-height: 1.6;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
}
.tooltip.show { opacity: 1; }
.legend {
    position: absolute;
    bottom: 20px;
    left: 20px;
    z-index: 10;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(8px);
    border: 1px solid #e8e8e8;
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 13px;
    line-height: 2;
    box-shadow: 0 2px 16px rgba(0,0,0,0.06);
    max-width: 200px;
}
.legend-dot {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    margin-right: 7px;
    vertical-align: middle;
}
.legend-title {
    font-weight: 600;
    margin-bottom: 4px;
    font-size: 14px;
    color: #333;
}
.stats {
    position: absolute;
    bottom: 20px;
    right: 20px;
    z-index: 10;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(8px);
    border: 1px solid #e8e8e8;
    border-radius: 10px;
    padding: 10px 16px;
    font-size: 12px;
    color: #666;
    line-height: 1.6;
    box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    text-align: right;
}
.link {
    stroke: #bbb;
    stroke-opacity: 0.5;
    transition: stroke-opacity 0.2s, stroke 0.2s;
}
.link:hover {
    stroke-opacity: 0.9;
    stroke: #666;
}
.link-cross {
    stroke-dasharray: 4, 4;
    stroke: #999;
    stroke-opacity: 0.4;
}
.node-label {
    font-size: 10px;
    fill: #444;
    pointer-events: none;
    text-anchor: middle;
    font-weight: 500;
    text-shadow: 0 1px 2px rgba(255,255,255,0.8), 0 1px 3px rgba(255,255,255,0.6);
}
.node-circle {
    cursor: grab;
    transition: r 0.2s;
}
.node-circle:hover {
    stroke: #ffd700 !important;
    stroke-width: 3 !important;
}
</style>
</head>
<body>

<div class="header">
  <h1>🔗 澳洲策略知识图谱</h1>
  <p>节点 = 知识卡片 | 连线 = 标签共现关联 | 悬停看详情 | 拖拽移动 | 滚轮缩放</p>
</div>

<div class="tooltip" id="tooltip"></div>

<div class="legend">
  <div class="legend-title">📂 主题分类</div>
  <div><span class="legend-dot" style="background:#2980b9"></span>移民 (3)</div>
  <div style="margin-top:8px;padding-top:6px;border-top:1px solid #eee;color:#999;font-size:11px;">
    共 3 张卡片 · 2 条关联
  </div>
</div>

<div class="stats" id="stats"></div>

<svg id="graph" width="100%" height="100%"></svg>

<script>
// 数据
var nodes = [{"id": "card-核心结论-00", "title": "后端技术栈选型策略 — 核心结论", "shortTitle": "后端技术栈选型策略…", "subtitle": "", "topic": "migration", "topic_zh": "移民", "group": "migration", "degree": 1, "isCenter": false}, {"id": "card-Stage4验证2min-00", "title": "Stage 4: 验证（~2min）", "shortTitle": "Stage 4: …", "subtitle": "表格: 环节 vs 推荐工具", "topic": "migration", "topic_zh": "移民", "group": "migration", "degree": 2, "isCenter": true}, {"id": "card-核心结论-00-1", "title": "微服务部署流水线设计 — 核心结论", "shortTitle": "微服务部署流水线设…", "subtitle": "", "topic": "migration", "topic_zh": "移民", "group": "migration", "degree": 1, "isCenter": false}];
var links = [{"source": "card-Stage4验证2min-00", "target": "card-核心结论-00-1", "weight": 5}, {"source": "card-核心结论-00", "target": "card-Stage4验证2min-00", "weight": 1}];

var width = window.innerWidth;
var height = window.innerHeight;
var svg = d3.select("#graph");
var g = svg.append("g");

// Zoom
var zoom = d3.zoom()
    .scaleExtent([0.1, 4])
    .on("zoom", function(e) {
        g.attr("transform", e.transform);
    });
svg.call(zoom);

// Colors
var color = d3.scaleOrdinal()
    .domain(["visa", "migration", "job", "living", "major", "assessment", "study", "policy", "finance", "university", "regional", "language"])
    .range(["#2471a3", "#2980b9", "#c0392b", "#1e8449", "#e67e22", "#d35400", "#7f8c8d", "#8e44ad", "#9b59b6", "#16a085", "#27ae60", "#f39c12"]);

// Stats
var stats = d3.select("#stats");
stats.html(
    '<div style="font-weight:600;color:#333">图谱概览</div>' +
    '节点: <b>' + nodes.length + '</b> | ' +
    '关联: <b>' + links.length + '</b>'
);

// 节点半径
var maxDegree = d3.max(nodes, function(d) { return d.degree; });
var rScale = d3.scaleSqrt()
    .domain([0, maxDegree || 1])
    .range([6, 14]);

// 聚类中心位置
var clusterRadius = Math.min(width, height) * 0.32;
var clusterCenters = {"migration": {"x": 6.123233995736766e-17, "y": -1.0}};

// 为每个节点设置初始位置（围绕主题中心随机分布）
nodes.forEach(function(d) {
    var c = clusterCenters[d.topic];
    if (c) {
        var angle = Math.random() * 2 * Math.PI;
        var dist = Math.random() * 30 + 10;
        d.x = width / 2 + c.x * clusterRadius + Math.cos(angle) * dist;
        d.y = height / 2 + c.y * clusterRadius + Math.sin(angle) * dist;
        d.vx = 0;
        d.vy = 0;
    }
});

// 判断是否为跨主题连接
function isCrossTopic(l) {
    var s = nodes.find(function(n) { return n.id === ((typeof l.source === 'object') ? l.source.id : l.source); });
    var t = nodes.find(function(n) { return n.id === ((typeof l.target === 'object') ? l.target.id : l.target); });
    if (!s || !t) return false;
    return s.topic !== t.topic;
}

// Force simulation - 强聚类引力
var sim = d3.forceSimulation(nodes)
    .force("link", d3.forceLink(links)
        .id(function(d) { return d.id; })
        .distance(function(l) {
            return isCrossTopic(l) ? 200 : 70;
        })
        .strength(function(l) {
            return isCrossTopic(l) ? 0.01 : 0.12;
        }))
    .force("charge", d3.forceManyBody()
        .strength(function(d) {
            return -30 - d.degree * 2;
        })
        .distanceMax(200))
    .force("center", d3.forceCenter(width / 2, height / 2))
    .force("collide", d3.forceCollide()
        .radius(function(d) { return rScale(d.degree) + 5; })
        .strength(0.4))
    .force("clusterX", d3.forceX(function(d) {
        var c = clusterCenters[d.topic];
        return c ? (width / 2 + c.x * clusterRadius) : width / 2;
    }).strength(0.15))
    .force("clusterY", d3.forceY(function(d) {
        var c = clusterCenters[d.topic];
        return c ? (height / 2 + c.y * clusterRadius) : height / 2;
    }).strength(0.15));

// Links
var link = g.append("g")
    .attr("class", "links")
    .selectAll("line")
    .data(links)
    .join("line")
    .attr("class", function(l) {
        return isCrossTopic(l) ? "link link-cross" : "link";
    })
    .attr("stroke-width", function(l) {
        return Math.max(0.6, l.weight * 0.5);
    });

// Nodes
var node = g.append("g")
    .attr("class", "nodes")
    .selectAll("g")
    .data(nodes)
    .join("g")
    .call(d3.drag()
        .on("start", function(e, d) {
            if (!e.active) sim.alphaTarget(0.3).restart();
            d.fx = d.x;
            d.fy = d.y;
        })
        .on("drag", function(e, d) {
            d.fx = e.x;
            d.fy = e.y;
        })
        .on("end", function(e, d) {
            if (!e.active) sim.alphaTarget(0);
            d.fx = null;
            d.fy = null;
        }));

node.append("circle")
    .attr("class", "node-circle")
    .attr("r", function(d) { return rScale(d.degree); })
    .attr("fill", function(d) { return color(d.group); })
    .attr("stroke", "#fff")
    .attr("stroke-width", 2);

node.append("text")
    .attr("class", "node-label")
    .text(function(d) { return d.shortTitle; })
    .attr("dy", function(d) { return rScale(d.degree) + 13; });

// Tooltip
var tooltip = d3.select("#tooltip");

node.on("mouseenter", function(e, d) {
    d3.select(this).select("circle")
        .attr("stroke", "#ffd700")
        .attr("stroke-width", 3);

    var connected = links.filter(function(l) {
        var s = (typeof l.source === 'object') ? l.source.id : l.source;
        var t = (typeof l.target === 'object') ? l.target.id : l.target;
        return s === d.id || t === d.id;
    });

    tooltip.html(
        '<b>' + d.title + '</b><br>' +
        '<span style="opacity:0.7">' + d.topic_zh + (d.subtitle ? ' · ' + d.subtitle : '') + '</span><br>' +
        '<span style="opacity:0.5;font-size:11px">关联 ' + connected.length + ' 张卡片</span>'
    ).classed("show", true);
})
.on("mousemove", function(e) {
    tooltip.style("left", (e.pageX + 16) + "px")
           .style("top", (e.pageY - 12) + "px");
})
.on("mouseleave", function() {
    d3.select(this).select("circle")
        .attr("stroke", "#fff")
        .attr("stroke-width", 2);
    tooltip.classed("show", false);
});

// Tick
sim.on("tick", function() {
    link
        .attr("x1", function(d) { return d.source.x; })
        .attr("y1", function(d) { return d.source.y; })
        .attr("x2", function(d) { return d.target.x; })
        .attr("y2", function(d) { return d.target.y; });
    node.attr("transform", function(d) {
        return "translate(" + d.x + "," + d.y + ")";
    });
});

// Resize
window.addEventListener("resize", function() {
    width = window.innerWidth;
    height = window.innerHeight;
    clusterRadius = Math.min(width, height) * 0.32;
    sim.force("center", d3.forceCenter(width / 2, height / 2));
    sim.force("clusterX", d3.forceX(function(d) {
        var c = clusterCenters[d.topic];
        return c ? (width / 2 + c.x * clusterRadius) : width / 2;
    }).strength(0.15));
    sim.force("clusterY", d3.forceY(function(d) {
        var c = clusterCenters[d.topic];
        return c ? (height / 2 + c.y * clusterRadius) : height / 2;
    }).strength(0.15));
    sim.alpha(0.3).restart();
});

// 3秒后稳定化
setTimeout(function() {
    sim.alpha(0.05).restart();
}, 3000);
</script>
</body>
</html>
